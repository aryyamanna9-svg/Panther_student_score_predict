<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | PantheR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 20%, #0d47a1, #000814 80%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      animation: float 12s ease-in-out infinite alternate;
    }
    .blob1 { width: 400px; height: 400px; background: #2563eb; top: -100px; left: -100px; animation-delay: 0s; }
    .blob2 { width: 500px; height: 500px; background: #9333ea; bottom: -150px; right: -120px; animation-delay: 3s; }
    @keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-30px) scale(1.05); } }

    /* Glassmorphism card */
    .glass {
      backdrop-filter: blur(16px) saturate(180%);
      background-color: rgba(20, 20, 35, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      transform: scale(0.98);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .glass:hover { transform: scale(1); box-shadow: 0 0 60px rgba(0, 122, 255, 0.3); }

    /* Floating labels */
    .floating-label { position: relative; }
    .floating-label input:focus + label,
    .floating-label input:not(:placeholder-shown) + label {
      top: -0.6rem; left: 0.8rem; font-size: 0.75rem; color: #3b82f6;
      background: rgba(20,20,35,0.8); padding: 0 0.25rem; border-radius: 4px;
    }
    .floating-label label {
      position: absolute; top: 0.9rem; left: 0.9rem;
      color: #94a3b8; pointer-events: none; transition: 0.2s ease all;
    }

    /* Fade animation */
    .fade-slide {
      opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out;
    }
    .fade-slide.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <!-- Floating blobs -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <form action="/login" method="POST" class="glass w-full max-w-md p-8 rounded-2xl fade-slide">
    <!-- Logo -->
    <div class="flex flex-col items-center gap-2 mb-6">
      
      <h1 class="text-3xl font-black text-white tracking-tight">PantheR</h1>
      <p class="text-gray-400 text-sm font-medium">Welcome back! Login to your account</p>
    </div>

    <!-- Email -->
    <div class="floating-label mb-5">
      <input type="email" name="email" placeholder=" " required
        class="w-full px-4 py-3 rounded-lg bg-transparent border border-gray-700 text-white focus:outline-none focus:border-blue-400" />
      <label>Email</label>
    </div>

    <!-- Password -->
    <div class="floating-label mb-7 relative">
      <input type="password" id="password" name="password" placeholder=" " required
        class="w-full px-4 py-3 rounded-lg bg-transparent border border-gray-700 text-white focus:outline-none focus:border-blue-400" />
      <label>Password</label>
      <button type="button" onclick="togglePassword()"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
        <span class="material-symbols-outlined">visibility</span>
      </button>
    </div>

    <!-- Submit -->
    <button type="submit"
      class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold rounded-lg hover:from-blue-500 hover:to-indigo-500 transition transform hover:scale-105 shadow-lg shadow-blue-600/30">
      Login
    </button>
    <!-- Back to Home Button -->
<button type="button" onclick="location.href='/'"
  class="w-full py-3 mt-4 bg-gray-700 text-white font-bold rounded-lg hover:bg-gray-600 transition transform hover:scale-105 shadow-lg shadow-gray-800/30">
  ← Back to Home
</button>


    <!-- Divider -->
    <div class="flex items-center gap-2 text-gray-400 text-sm my-5">
      <span class="flex-grow border-t border-gray-700"></span>
      OR
      <span class="flex-grow border-t border-gray-700"></span>
    </div>

    <!-- Google Login -->
    <button type="button"
      class="w-full py-3 bg-gray-800 border border-gray-700 text-white rounded-lg flex items-center justify-center gap-3 hover:bg-gray-700 transition transform hover:scale-105">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google" />
      Login with Google
    </button>

    <!-- Footer -->
    <p class="text-center text-gray-400 text-sm mt-6">
      Don't have an account? <a href="/signup" class="text-blue-400 hover:underline">Sign Up</a>.
    </p>
  </form>

  <script>
    function togglePassword() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelector('.fade-slide').classList.add('show');
    });
  </script>
</body>
</html>
