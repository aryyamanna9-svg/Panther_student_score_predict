<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panther - Prediction Result</title>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<!-- Tailwind CSS & Chart.js -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Tailwind Config -->
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#00ff88",
        backgroundLight: "#f6f7f8",
        backgroundDark: "#111418",
        cardDark: "#1f1f1f",
        textSecondaryDark: "#A9A9A9"
      },
      fontFamily: { display: ["Space Grotesk", "sans-serif"] },
      borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" }
    }
  }
}
</script>

<!-- Icon Style -->
<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}
</style>
</head>

<body class="bg-backgroundLight dark:bg-backgroundDark text-white font-display min-h-screen flex flex-col">

<!-- Header -->
<header class="flex items-center justify-between px-6 py-4 border-b border-gray-700">
  <h1 class="text-3xl font-bold text-primary">Panther</h1>
  <nav class="flex gap-6">
    <a href="/" class="text-white hover:text-primary font-semibold">Home</a>
    <a href="/predict-form" class="text-white hover:text-primary font-semibold">Predict</a>
  </nav>
</header>

<!-- Main Content -->
<main class="flex-1 p-6 lg:p-10 max-w-6xl mx-auto">

  <!-- Prediction Result Card -->
  <div class="bg-cardDark rounded-xl p-8 mb-8 shadow-lg flex flex-col items-center text-center">
    <span class="material-symbols-outlined text-6xl text-primary mb-4">insights</span>
    <h2 class="text-2xl font-bold mb-2">Prediction Result</h2>
    <p class="text-xl text-primary font-extrabold">{{ prediction }}</p>
  </div>

  <!-- Stats Cards -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
    <div class="bg-cardDark rounded-xl p-6 flex flex-col gap-2">
      <p class="text-textSecondaryDark font-medium">Predicted Score</p>
      <p class="text-white text-2xl font-bold">{{ prediction_score|default(75) }}%</p>
    </div>
    <div class="bg-cardDark rounded-xl p-6 flex flex-col gap-2">
      <p class="text-textSecondaryDark font-medium">Confidence Level</p>
      <p class="text-white text-2xl font-bold">85%</p>
    </div>
    <div class="bg-cardDark rounded-xl p-6 flex flex-col gap-2">
      <p class="text-textSecondaryDark font-medium">Comparison Avg</p>
      <p class="text-white text-2xl font-bold">78%</p>
    </div>
  </div>

  <!-- Chart Card -->
  <div class="bg-cardDark rounded-xl p-6 mb-8 shadow-lg h-80 flex items-center justify-center">
    <canvas id="scoreChart" class="w-full h-full"></canvas>
  </div>

  <!-- Back Button -->
  <div class="flex justify-center">
    <a href="/predict-form" class="px-6 py-3 bg-primary text-gray-900 font-bold rounded-full hover:bg-green-500 transition-colors">← Back to Prediction Form</a>
  </div>
</main>

<!-- Modern Chart Script -->
<script>
const ctx = document.getElementById('scoreChart').getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 400);
gradient.addColorStop(0, 'rgba(0, 255, 136, 0.9)');
gradient.addColorStop(1, 'rgba(0, 255, 200, 0.2)');

const predictedScore = {{ prediction_score|default(75) }};

const data = {
  labels: ['Predicted Score'],
  datasets: [{
    label: 'Performance (%)',
    data: [predictedScore],
    backgroundColor: gradient,
    borderColor: '#00ff88',
    borderWidth: 2,
    borderRadius: 12,
    hoverBackgroundColor: 'rgba(0,255,136,1)',
    barThickness: 60,
  }]
};

new Chart(ctx, {
  type: 'bar',
  data: data,
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1f1f1f',
        titleColor: '#00ff88',
        bodyColor: '#ffffff',
        borderColor: '#00ff88',
        borderWidth: 1,
        displayColors: false,
      },
      title: {
        display: true,
        text: 'Predicted Student Performance',
        color: '#ffffff',
        font: { size: 18, family: 'Space Grotesk', weight: 'bold' }
      }
    },
    scales: {
      y: {
        beginAtZero: true,
        max: 100,
        grid: { color: 'rgba(255,255,255,0.1)' },
        ticks: { color: '#A9A9A9', font: { size: 14 } }
      },
      x: {
        grid: { display: false },
        ticks: { color: '#A9A9A9', font: { size: 14 } }
      }
    },
    animation: {
      duration: 1200,
      easing: 'easeOutQuart'
    }
  }
});
</script>

</body>
</html>
